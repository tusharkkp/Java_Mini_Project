# ============================================================
# Disaster Relief Volunteer Coordination System
# Application Configuration
# ============================================================

# --- Server Configuration ---
server.port=8081

# --- MySQL Database Configuration ---
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_relief_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JSP View Resolver Configuration ---
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# --- Spring Security - Allow static resources ---
spring.web.resources.static-locations=classpath:/static/,/WEB-INF/css/

# --- Async and Scheduling ---
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.scheduling.pool.size=3

# --- Socket Server Configuration ---
socket.server.port=9090

# --- SDG Metrics Configuration ---
sdg.response.threshold.minutes=30

# --- Logging ---
logging.level.com.disasterrelief=DEBUG
logging.level.org.springframework.security=DEBUG
